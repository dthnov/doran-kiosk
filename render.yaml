services:
  - type: web
    name: doran-kiosk
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: gpt-4o-mini
      - key: WHISPER_MODEL
        value: whisper-1
      - key: TTS_MODEL
        value: tts-1
      - key: TTS_VOICE
        value: nova
